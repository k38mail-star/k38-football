<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前端测试</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div class="hero">
        <div class="hero-stats">
            <div class="hero-stat">
                <span class="hero-stat-num" id="heroTotal">1069</span>
                <span class="hero-stat-label">总比赛数</span>
            </div>
        </div>
    </div>
    <script src="static/app.js"></script>
    <script>
        console.log('✅ K38 Framework 加载成功:', typeof K38);
        console.log('✅ 可用方法:', Object.keys(K38));
        
        // 测试数字动画
        const testNum = document.getElementById('heroTotal');
        if (testNum) {
            console.log('✅ heroTotal 元素找到');
            setTimeout(() => {
                K38.animateNumber(testNum, 2000);
                console.log('🎬 数字动画触发: 1069 → 2000');
            }, 1000);
        }
    </script>
</body>
</html>
