{% extends "base.html" %}

{% block title %}赛前预测 — K38 足球{% endblock %}

{% block content %}
<section class="predictions-page">
    <div class="predictions-header">
        <div>
            <div class="section-kicker">赛前模型</div>
            <h1>即将开始比赛预测</h1>
            <p>基于历史交锋、近 5 场状态、进失球和半场领先表现综合排序</p>
        </div>
        <div class="prediction-total">
            <strong id="predictionTotal">0</strong>
            <span>场比赛</span>
        </div>
    </div>

    <div class="predictions-list" id="predictionsList">
        <div class="loading-screen">
            <div class="loading-spinner"></div>
            <span>加载预测数据...</span>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    let currentPage = 1;
    const perPage = 30;

    window.loadPredictionPage = page => {
        currentPage = page;
        loadPredictions();
    };

    async function loadPredictions() {
        const list = document.getElementById('predictionsList');
        list.innerHTML = K38.skeleton(4, 'prediction');

        try {
            const params = new URLSearchParams({ page: currentPage, per_page: perPage });
            const data = await K38.jsonFetch(`/api/predictions?${params}`);
            const matches = data.predictions || [];

            K38.setStatus(data.is_mock);
            document.getElementById('predictionTotal').textContent = data.total || 0;

            if (matches.length === 0) {
                list.innerHTML = K38.empty('暂无即将开始的比赛');
                return;
            }

            list.innerHTML = matches.map(renderPredictionCard).join('') + K38.pagination(data.pagination, 'loadPredictionPage');
            K38.animateIn('.prediction-card', list);
        } catch (e) {
            list.innerHTML = K38.empty(`加载失败: ${e.message}`, '❌');
        }
    }

    function renderPredictionCard(m) {
        const p = m.prediction;
        const home = teamLabel(m, 'home');
        const away = teamLabel(m, 'away');
        const time = m.match_date ? new Date(m.match_date).toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '待定';
        const predictionBody = (!p || p.insufficient_data)
            ? `<div class="prediction-card-empty">暂无足够数据预测</div>`
            : renderPredictionBody(m, p);

        return `
            <a href="/match/${m.fixture_id}" class="prediction-card" style="--accent: ${m.league_color}">
                <div class="prediction-card-top">
                    <span><span class="league-badge" style="background:${m.league_color}"></span>🏆 ${K38.esc(m.league_name)}${m.round ? ' · ' + K38.esc(m.round) : ''}</span>
                    <time>${K38.esc(time)}</time>
                </div>
                <div class="prediction-teams">
                    <strong>${home}</strong>
                    <span>VS</span>
                    <strong>${away}</strong>
                </div>
                ${predictionBody}
            </a>
        `;
    }

    function renderPredictionBody(m, p) {
        const bars = [
            ['主胜', p.home_win_prob, 'home'],
            ['平局', p.draw_prob, 'draw'],
            ['客胜', p.away_win_prob, 'away']
        ];
        const winner = p.winner === 'draw' ? '平局' : `${teamText(m, p.winner)} 获胜`;

        return `
            <div class="prediction-card-result">
                <span>预测 ${K38.esc(winner)}</span>
                <strong>${p.confidence}%</strong>
            </div>
            <div class="probability-bars">
                ${bars.map(([label, value, cls]) => `
                    <div class="probability-row ${cls}">
                        <span>${label}</span>
                        <i><b style="width: ${value}%"></b></i>
                        <strong>${value}%</strong>
                    </div>
                `).join('')}
            </div>
            <div class="prediction-score">预测比分 <strong>${K38.esc(p.predicted_score || '待定')}</strong></div>
            ${renderPredictionContext(m, p)}
            <div class="prediction-card-detail">${K38.esc(p.prediction_detail || '')}</div>
            <div class="prediction-factors">
                ${(p.factors || []).slice(0, 4).map(f => `<span class="${K38.esc(f.type)}">${K38.esc(f.text)}</span>`).join('')}
            </div>
        `;
    }

    function renderPredictionContext(m, p) {
        const h = p.h2h_summary || {};
        const inj = p.injury_summary || {};
        const elo = p.elo_summary || {};
        const h2hText = h.total
            ? `${K38.esc(teamShortName(m, 'home'))} ${h.home_wins}-${h.away_wins} ${K38.esc(teamShortName(m, 'away'))}，平 ${h.draws}`
            : '暂无 API 历史交锋';
        const injuryText = `${K38.esc(teamShortName(m, 'home'))} ${inj.home_count || 0}人 -${inj.home_penalty || 0}% · ${K38.esc(teamShortName(m, 'away'))} ${inj.away_count || 0}人 -${inj.away_penalty || 0}%`;
        const eloText = (elo.home_elo && elo.away_elo)
            ? `${K38.esc(teamShortName(m, 'home'))} ${elo.home_elo} · ${K38.esc(teamShortName(m, 'away'))} ${elo.away_elo}`
            : 'Elo 样本不足';
        return `
            <div class="prediction-context">
                <div><span>H2H</span><strong>${h2hText}</strong></div>
                <div><span>伤病</span><strong>${injuryText}</strong></div>
                <div><span>Elo</span><strong>${eloText}</strong></div>
            </div>
        `;
    }

    function teamLabel(m, side) {
        const flag = m[`${side}_flag`] || '';
        const name = m[`${side}_team_en`] || m[`${side}_team`] || '';
        return K38.esc(`${flag ? flag + ' ' : ''}${name}`);
    }

    function teamText(m, side) {
        const flag = m[`${side}_flag`] || '';
        const name = m[`${side}_team_en`] || m[`${side}_team`] || '';
        return `${flag ? flag + ' ' : ''}${name}`;
    }

    function teamShortName(m, side) {
        return m[`${side}_team_en`] || m[`${side}_team`] || '';
    }

    loadPredictions();
</script>
{% endblock %}
