<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}K38 足球 — 实时比分 · 赛事监控{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-brand">
                <span class="brand-icon">⚽</span>
                <span class="brand-text">
                    <strong>K38 足球</strong>
                    <small>实时比分 · 赛事监控</small>
                </span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">比分</a>
                <a href="/predictions" class="nav-link {% if request.path.startswith('/predictions') %}active{% endif %}">预测</a>
                <a href="/standings" class="nav-link {% if request.path.startswith('/standings') %}active{% endif %}">积分榜</a>
            </div>
            <div class="nav-status">
                <span class="status-indicator" id="statusDot"></span>
                <span id="statusText" class="status-text">加载中...</span>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="footer">
        <div class="footer-inner">
            <span>K38 足球监控 · Built by K38 AI Cluster</span>
            <span class="footer-mock" id="footerMock"></span>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
