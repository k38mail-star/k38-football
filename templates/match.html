{% extends "base.html" %}

{% block title %}比赛详情 — K38 足球{% endblock %}

{% block content %}
<div class="match-detail" id="matchDetail">
    <div class="loading">加载中...</div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const fixtureId = {{ fixture_id }};
    let liveRefreshTimer = null;

    async function loadMatch() {
        const container = document.getElementById('matchDetail');

        try {
            const resp = await fetch(`/api/match/${fixtureId}`);
            const m = await resp.json();

            if (m.error) {
                container.innerHTML = '<div class="error-state">比赛未找到</div>';
                stopLiveRefresh();
                return;
            }

            const isLive = m.status_sort <= 2;
            const isFinished = m.status_sort === 4;
            const isUpcoming = m.status_sort === 3 && m.home_goals === null && m.away_goals === null;

            document.getElementById('statusText').textContent = isLive ? '自动刷新中' : (isFinished ? '已结束' : '未开始');
            document.getElementById('statusDot').className = 'status-dot ' + (isLive ? 'green' : 'yellow');

            const badge = isLive
                ? `<span class="badge live-badge">🟢 ${m.elapsed || 0}'</span>`
                : isFinished
                    ? '<span class="badge finished-badge">🏁 已结束</span>'
                    : `<span class="badge upcoming-badge">📋 ${escapeHtml(m.status || '未开始')}</span>`;

            container.innerHTML = `
                <section class="detail-score-card">
                    <div class="detail-meta">
                        <span class="detail-league">${escapeHtml(m.league_name)}</span>
                        <span class="detail-round">${escapeHtml(m.round || '')}</span>
                        ${badge}
                    </div>
                    <div class="detail-scoreboard">
                        <div class="detail-team home">
                            <div class="team-name">${escapeHtml(m.home_team)}</div>
                        </div>
                        <div class="detail-score">
                            ${isUpcoming ? '<span class="big-vs">vs</span>' : `
                                <span class="big-score ${m.home_goals !== null && m.away_goals !== null && m.home_goals > m.away_goals ? 'winner' : ''}">${m.home_goals ?? '?'}</span>
                                <span class="big-sep">-</span>
                                <span class="big-score ${m.home_goals !== null && m.away_goals !== null && m.away_goals > m.home_goals ? 'winner' : ''}">${m.away_goals ?? '?'}</span>
                            `}
                        </div>
                        <div class="detail-team away">
                            <div class="team-name">${escapeHtml(m.away_team)}</div>
                        </div>
                    </div>
                    ${m.latest_goal ? `<div class="detail-goal-hint">${escapeHtml(m.latest_goal)}</div>` : ''}
                    <div class="score-splits">
                        ${scoreSplit('半场', m.halftime_home, m.halftime_away)}
                        ${scoreSplit('全场', m.fulltime_home, m.fulltime_away)}
                        ${scoreSplit('加时', m.extra_home, m.extra_away)}
                        ${scoreSplit('点球', m.penalty_home, m.penalty_away)}
                    </div>
                    <div class="detail-info">
                        <span>🏟️ ${escapeHtml(m.venue || '未知场地')}</span>
                        <span>👨‍⚖️ ${escapeHtml(m.referee || '未知裁判')}</span>
                        <span>📅 ${m.match_date ? new Date(m.match_date).toLocaleString('zh-CN') : '待定'}</span>
                    </div>
                </section>

                <section class="detail-section">
                    <h2>事件时间线</h2>
                    ${m.events && m.events.length > 0 ? `
                        <div class="events-timeline">
                            ${m.events.slice().sort((a, b) => Number(a.time || 0) - Number(b.time || 0)).map(e => renderEvent(e, m)).join('')}
                        </div>
                    ` : '<div class="empty-state">暂无比赛事件</div>'}
                </section>

                <section class="detail-section">
                    <h2>统计数据</h2>
                    ${m.stats && Object.keys(m.stats).length > 0 ? `
                        <div class="stats-list">
                            ${renderStats(m)}
                        </div>
                    ` : '<div class="empty-state">暂无统计数据</div>'}
                </section>
            `;

            if (isLive) startLiveRefresh();
            else stopLiveRefresh();
        } catch (e) {
            container.innerHTML = '<div class="error-state">加载失败: ' + escapeHtml(e.message) + '</div>';
        }
    }

    function renderStats(m) {
        const grouped = {};
        Object.entries(m.stats).forEach(([key, value]) => {
            const statName = key.replace(/_\d+$/, '');
            if (!grouped[statName]) grouped[statName] = {};
            if (key.endsWith('_' + m.home_team_id)) grouped[statName].home = value;
            else if (key.endsWith('_' + m.away_team_id)) grouped[statName].away = value;
        });

        const preferred = ['Ball Possession', 'Total Shots', 'Shots on Goal', 'Corner Kicks', 'Fouls', 'Yellow Cards', 'Red Cards'];
        const names = Object.keys(grouped).sort((a, b) => {
            const ai = preferred.indexOf(a);
            const bi = preferred.indexOf(b);
            return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
        });

        return names.map(name => {
            const vals = grouped[name];
            return `
                <div class="stat-row">
                    <div class="stat-line">
                        <span class="stat-val home">${escapeHtml(vals.home || '—')}</span>
                        <span class="stat-name">${translateStat(name)}</span>
                        <span class="stat-val away">${escapeHtml(vals.away || '—')}</span>
                    </div>
                    <div class="stat-bars">
                        ${statBars(name, vals.home, vals.away)}
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderEvent(e, match) {
        const side = e.team === match.home_team ? 'home' : (e.team === match.away_team ? 'away' : '');
        return `
            <div class="event-item ${side}">
                <span class="event-time">${e.time ?? ''}'</span>
                <span class="event-icon">${eventIcon(e)}</span>
                <span class="event-main">
                    <strong>${escapeHtml(e.player || e.team || '')}</strong>
                    <small>${escapeHtml(e.team || '')}${e.detail ? ' · ' + escapeHtml(e.detail) : ''}</small>
                </span>
            </div>
        `;
    }

    function eventIcon(e) {
        const type = String(e.type || '').toLowerCase();
        const detail = String(e.detail || '').toLowerCase();
        if (type.includes('goal')) return '⚽';
        if (type.includes('card') && detail.includes('yellow')) return '🟨';
        if (type.includes('card')) return '🟥';
        if (type.includes('subst') || detail.includes('subst')) return '🔄';
        return '📌';
    }

    function scoreSplit(label, home, away) {
        if (home === null || home === undefined || away === null || away === undefined) return '';
        return `<span><em>${label}</em><strong>${home}:${away}</strong></span>`;
    }

    function statBars(name, home, away) {
        const h = parseStatValue(home);
        const a = parseStatValue(away);
        const total = h + a;
        const homeWidth = total > 0 ? Math.max((h / total) * 100, h > 0 ? 6 : 0) : 50;
        const awayWidth = total > 0 ? Math.max((a / total) * 100, a > 0 ? 6 : 0) : 50;
        const cls = name === 'Ball Possession' ? ' possession' : '';
        return `
            <span class="stat-bar home${cls}"><i style="width: ${homeWidth}%"></i></span>
            <span class="stat-bar away${cls}"><i style="width: ${awayWidth}%"></i></span>
        `;
    }

    function parseStatValue(value) {
        const parsed = parseFloat(String(value ?? '0').replace('%', ''));
        return Number.isFinite(parsed) ? parsed : 0;
    }

    function translateStat(name) {
        const map = {
            'Ball Possession': '控球率',
            'Total Shots': '射门',
            'Shots on Goal': '射正',
            'Corner Kicks': '角球',
            'Fouls': '犯规',
            'Yellow Cards': '黄牌',
            'Red Cards': '红牌'
        };
        return map[name] || name;
    }

    function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, s => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[s]));
    }

    function startLiveRefresh() {
        if (!liveRefreshTimer) {
            liveRefreshTimer = setInterval(loadMatch, 15000);
        }
    }

    function stopLiveRefresh() {
        if (liveRefreshTimer) {
            clearInterval(liveRefreshTimer);
            liveRefreshTimer = null;
        }
    }

    loadMatch();
</script>
{% endblock %}
