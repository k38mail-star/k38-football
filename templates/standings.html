{% extends "base.html" %}

{% block title %}积分榜 — K38 足球{% endblock %}

{% block content %}
<div class="page-shell">
    <section class="hero-strip">
        <div>
            <div class="hero-kicker">🏆 K38 足球</div>
            <h1 class="hero-title">联赛积分榜</h1>
            <p class="hero-subtitle">排名、净胜球和积分实时汇总</p>
        </div>
        <div class="hero-metrics">
            <div class="metric"><strong id="metricLeagues">0</strong><span>联赛</span></div>
            <div class="metric"><strong id="metricTeams">0</strong><span>球队</span></div>
            <div class="metric"><strong id="metricTop">0</strong><span>最高分</span></div>
        </div>
    </section>

    <section class="control-card">
        <div class="control-label">
            <span>联赛筛选</span>
            <small>Standings</small>
        </div>
        <div class="filter-bar">
            <button class="filter-btn active" data-league="all" style="--league-color: var(--brand)">全部联赛</button>
            {% for lid, color in leagues.items() %}
            <button class="filter-btn" data-league="{{ lid }}" style="--league-color: {{ color }}">
                <span class="league-dot" style="background: {{ color }}"></span>
                {{ league_icons[loop.index0 % league_icons|length] }} {{ league_names.get(lid, lid) }}
            </button>
            {% endfor %}
        </div>
    </section>

    <div class="refresh-bar">
        <div class="match-summary">
            <span class="match-count">积分榜</span>
            <span class="update-time">更新于 <span id="updateTime">—</span></span>
        </div>
        <button class="refresh-btn" id="refreshBtn" type="button" onclick="refreshStandings()">
            <span class="refresh-icon">↻</span> 刷新
        </button>
    </div>

    <div class="standings-list" id="standingsList">
        <div class="loading">加载中...</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let currentLeague = 'all';

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentLeague = btn.dataset.league;
            loadStandings();
        });
    });

    async function loadStandings() {
        const list = document.getElementById('standingsList');
        list.innerHTML = K38.skeleton(3, 'table');

        try {
            const data = await K38.jsonFetch(`/api/standings?league=${currentLeague}`);

            K38.setStatus(data.is_mock);
            document.getElementById('updateTime').textContent = data.updated_at || new Date().toLocaleString('zh-CN');
            updateMetrics(data.standings || []);

            if (!data.standings || data.standings.length === 0) {
                list.innerHTML = K38.empty('暂无已完赛积分数据');
                return;
            }

            list.innerHTML = data.standings.map(renderTable).join('');
            K38.animateIn('.standings-card', list);
        } catch (e) {
            list.innerHTML = K38.empty(`加载失败: ${e.message}`, '❌');
        }
    }

    function updateMetrics(tables) {
        const teams = tables.reduce((sum, table) => sum + table.teams.length, 0);
        const top = tables.reduce((best, table) => {
            const tableBest = table.teams.reduce((max, team) => Math.max(max, team.points), 0);
            return Math.max(best, tableBest);
        }, 0);
        document.getElementById('metricLeagues').textContent = tables.length;
        document.getElementById('metricTeams').textContent = teams;
        document.getElementById('metricTop').textContent = top;
    }

    function renderTable(table) {
        return `
            <section class="standings-card" style="--league-color: ${table.league_color}">
                <div class="standings-header">
                    <div>
                        <h1>${K38.esc(table.league_name)}</h1>
                        <span>${table.teams.length} 支球队 · 按积分 / 净胜球排序</span>
                    </div>
                </div>
                <div class="standings-table-wrap">
                    <table class="standings-table">
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>球队</th>
                                <th>赛</th>
                                <th>胜</th>
                                <th>平</th>
                                <th>负</th>
                                <th>进</th>
                                <th>失</th>
                                <th>净</th>
                                <th>分</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${table.teams.map(team => `
                                <tr>
                                    <td class="rank ${team.rank <= 3 ? 'medal' : ''}">${rankLabel(team.rank)}</td>
                                    <td class="team-cell"><span class="team-color" style="background: ${table.league_color}"></span>${K38.esc(team.team)}</td>
                                    <td>${team.played}</td>
                                    <td>${team.wins}</td>
                                    <td>${team.draws}</td>
                                    <td>${team.losses}</td>
                                    <td>${team.goals_for}</td>
                                    <td>${team.goals_against}</td>
                                    <td class="${team.goal_difference > 0 ? 'positive' : team.goal_difference < 0 ? 'negative' : ''}">${team.goal_difference}</td>
                                    <td class="points">${team.points}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </section>
        `;
    }

    async function refreshStandings() {
        const btn = document.getElementById('refreshBtn');
        btn.classList.add('is-refreshing');
        await loadStandings();
        setTimeout(() => btn.classList.remove('is-refreshing'), 500);
    }

    function rankLabel(rank) {
        if (rank === 1) return '🥇';
        if (rank === 2) return '🥈';
        if (rank === 3) return '🥉';
        return rank;
    }

    loadStandings();
</script>
{% endblock %}
