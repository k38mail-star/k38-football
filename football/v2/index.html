*{margin:0;padding:0;box-sizing:border-box}

.header{background:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e8ecf1;position:sticky;top:0;z-index:10}

.nav a.active{background:#2563eb;color:#fff}
.featured{display:flex;gap:10px;padding:16px 20px;overflow-x:auto}
.featured-card{min-width:200px;background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 3px #0000000d;flex-shrink:0}

.featured-card .teams .name{font-size:13px;font-weight:500}
.featured-card .teams .score{font-size:22px;font-weight:700;color:#2563eb}
.featured-card .teams .score.none{color:#94a3b8}
.featured-card .status-bar{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:#94a3b8}
.featured-card .status-bar .live{color:#22c55e;font-weight:600}
.section{padding:0 20px 12px;display:flex;align-items:center;justify-content:space-between}
.section h2{font-size:16px;font-weight:600}
.section .counts{display:flex;gap:12px}
.section .counts span{font-size:12px;color:#64748b;display:flex;align-items:center;gap:4px}
.section .counts .num{font-weight:600;color:#1a1a2e}
.filters{display:flex;gap:6px;padding:0 20px 12px;flex-wrap:wrap}
.filters .pill{padding:5px 14px;border-radius:16px;border:1px solid #e2e8f0;background:#fff;color:#64748b;font-size:12px;cursor:pointer;transition:all .2s}
.filters .pill.active{background:#2563eb;color:#fff;border-color:#2563eb}
.filters .pill .num{background:#f1f5f9;padding:0 6px;border-radius:8px;margin-left:4px;font-size:11px}
.filters .pill.active .num{background:#ffffff33;color:#fff}
.matches{padding:0 20px;display:grid;gap:6px}
.match{background:#fff;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 2px #00000008;cursor:pointer;transition:all .2s}
.match:hover{box-shadow:0 2px 8px #0000001a}
.match .league-tag{font-size:10px;color:#94a3b8;width:80px;flex-shrink:0}
.match .teams{flex:1;display:grid;gap:4px}
.match .teams .row{display:flex;justify-content:space-between;font-size:14px}
.match .teams .row .name{font-weight:500}
.match .teams .row .g{margin-left:auto;min-width:24px;text-align:right;font-weight:600}
.match .status-tag{font-size:11px;padding:3px 10px;border-radius:12px;text-align:center;min-width:50px}
.match .status-tag.live{background:#22c55e15;color:#22c55e;font-weight:600}
.match .status-tag.finished{background:#94a3b815;color:#64748b}
.match .status-tag.upcoming{background:#eab30815;color:#eab308}
.pagination{display:flex;justify-content:center;gap:8px;padding:20px}
.pagination button{padding:8px 18px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;color:#64748b;cursor:pointer}
.pagination button:disabled{opacity:.5}
